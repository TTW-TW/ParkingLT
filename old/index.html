<!doctype html>
<html lang="zh-Hant-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ParkingLT - 宜蘭即時停車地圖</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                height: 100%;
                width: 100%;
                font-family: "Microsoft JhengHei", sans-serif;
            }
            #map {
                height: 100%;
                width: 100%;
                z-index: 1;
            }
            .info-panel {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.95);
                padding: 15px;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
                max-width: 280px;
                border: 1px solid #ddd;
            }
            .elder-popup {
                font-size: 18px;
                line-height: 1.5;
                min-width: 250px;
            }
            .elder-popup b {
                font-size: 22px;
                color: #000;
            }
            .fee-info {
                background: #fff9c4;
                padding: 5px;
                border-radius: 4px;
                margin: 8px 0;
                font-size: 16px;
                border-left: 5px solid #fbc02d;
            }
            .badge {
                display: inline-block;
                padding: 6px 12px;
                border-radius: 8px;
                font-weight: bold;
                margin-top: 8px;
                font-size: 18px;
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
            .has-data {
                background-color: #e8f5e9;
                color: #2e7d32;
                border: 1px solid #c8e6c9;
            }
            .no-data {
                background-color: #ffebee;
                color: #c62828;
                border: 1px solid #ffcdd2;
            }
            .avail-num {
                font-size: 28px;
                color: #d32f2f;
            }
        </style>
    </head>
    <body>
        <div class="info-panel">
            <h3 style="margin: 0">ParkingLT 縣府資料源</h3>
            <div id="stat-content" style="margin-top: 10px">
                讀取 JSON 檔案中...
            </div>
        </div>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="script.js"></script>
    </body>
</html>
