<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="快速查看首都還有沒有停車位，地圖小白也會用"
        />
        <title>停車位還有嗎 🚗</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <!-- 瀏覽器分頁圖示 (Favicon) -->
        <link rel="icon" type="image/png" href="img/favicon.png" />

        <!-- Apple 手機網頁加入主畫面圖示 -->
        <link rel="apple-touch-icon" href="img/favicon.png" />

        <!-- (選用) 針對不同尺寸的 Apple 圖示設定 -->
        <link rel="apple-touch-icon" sizes="152x152" href="img/favicon.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="img/favicon.png" />

        <link rel="icon" sizes="192x192" href="img/favicon.png" />

        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body class="p-4 max-w-md mx-auto">
        <!-- 1.問候語 -->
        <div
            id="greeting-section"
            class="flex items-center mb-4 rounded-tl-[28px] rounded-br-[28px] shadow-[4px_4px_6px_0px_rgba(0,0,0,0.2)]"
        >
            <img id="greeting-img" class="w-10 h-10 m-2" />
            <div class="italic" id="greeting-text">載入中...</div>
        </div>

        <!-- 載入中動畫 -->
        <div
            id="loading-section"
            class="flex flex-col items-center justify-center py-4"
        >
            <div class="text-l my-6 text-center line-height: 1.5">
                阿貓很努力在找車位中<br />等他一下下
            </div>
            <img
                src="img/loading.webp"
                class="w-72 animate-float mt-5"
                alt="Loading"
            />
        </div>

        <!-- 載入時預設隱藏的區塊 2~5 -->
        <div id="main-content" class="hidden">
            <!-- 2.更新時間 -->

            <div class="flex justify-between items-center mb-4">
                <!-- 資料更新時間 -->
                <div class="flex items-center gap-1 text-sm text-gray-600">
                    <div class="text-sm">
                        <span id="update-time">尚未</span> 更新
                    </div>
                    <span
                        id="update-status"
                        class="font-bold ml-1 transition-opacity duration-300"
                    ></span>
                </div>

                <!-- 刷新按鈕 -->
                <button
                    id="refresh-btn"
                    class="relative overflow-hidden bg-green-800 text-white px-4 py-3 my-1 rounded shadow-md text-sm transition-all active:scale-90"
                >
                    <span
                        id="refresh-progress"
                        class="absolute left-0 top-0 h-full w-0 bg-green-600 opacity-50 transition-none"
                    ></span>
                    <span class="relative z-10">↻ 刷新</span>
                </button>
            </div>

            <!-- 3. 常用地點區 -->
            <div
                class="grid grid-cols-4 gap-0 mb-6 border font-bold border-gray-400 rounded overflow-hidden text-center shadow-md"
                id="site-buttons"
            ></div>

            <!-- 4. 停車資訊區 -->
            <div id="parking-info-section" class="mb-6">
                <!-- 加入 touch-area 方便綁定滑動事件 -->
                <div id="touch-area">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <!-- 設定固定寬度並靠左/靠右對齊 -->
                        <button
                            id="prev-parking"
                            class="w-10 text-3xl font-bold text-green-800 active:scale-90 transition-transform text-left"
                        >
                            ◀
                        </button>
                        <h2
                            id="parking-name"
                            class="text-lg font-bold text-center flex-grow truncate px-2"
                        >
                            載入中...
                        </h2>
                        <button
                            id="next-parking"
                            class="w-10 text-3xl font-bold text-green-800 active:scale-90 transition-transform text-right"
                        >
                            ▶
                        </button>
                    </div>
                    <div
                        class="bg-gray-50 p-4 rounded-xl border border-gray-400 shadow-md text-lg"
                    >
                        <div class="flex justify-between items-center mb-2">
                            <span>剩餘車位：</span>
                            <span
                                id="slots-color-container"
                                class="font-bold text-green-600"
                            >
                                <span id="available-slots" class="text-3xl"
                                    >--</span
                                >
                            </span>
                            <span>，總共：</span>
                            <span><span id="total-slots">--</span> 個</span>
                        </div>
                        <div class="flex items-start text-sm text-gray-600">
                            <span class="whitespace-nowrap">地址：</span>
                            <span id="parking-address" class="flex-grow"
                                >--</span
                            >
                            <a
                                id="google-nav"
                                href="#"
                                target="_blank"
                                class="ml-2 flex items-center text-blue-600 whitespace-nowrap"
                            >
                                導航
                                <img
                                    src="img/googlemapIcon.svg"
                                    class="w-5 h-4 ml-1"
                                />
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 5.地圖區 -->
            <div id="map-container" class="shadow-sm overflow-hidden">
                <div id="map"></div>
            </div>
        </div>

        <!-- 大笨鳥錯誤區 -->
        <div id="error-section" class="hidden text-center py-6">
            <img src="img/data404.svg" class="w-56 mx-auto mb-4" />
            <h3 class="text-xl mb-4">網頁掛掉了 ヽ(ﾟД ﾟ; )ﾉ</h3>
            <p class="text-md mb-4">可改去下面兩個網站試試看</p>
            <div class="flex flex-col space-y-2">
                <a
                    href="https://parkboss.tw/map/yilan-county"
                    class="text-blue-600 underline text-lg"
                    >停車我最大</a
                >
                <a
                    href="https://tp.e-land.gov.tw/ATIS?Parking=ShowParkingTab"
                    class="text-blue-600 underline text-lg"
                    >宜蘭縣交通資訊</a
                >
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="config.js"></script>
        <script src="map.js"></script>
        <script src="main.js"></script>
    </body>
</html>
